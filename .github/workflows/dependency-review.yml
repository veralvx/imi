name: Dependency Review

on:
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/Dockerfile"
      - "**/docker-compose*.yml"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: License & Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          # audit your current dependency licenses:
          #   cargo tree --format "{p} {l}" | sort -u
          allow-licenses: >
            0BSD, Apache-2.0, BlueOak-1.0.0, BSD-2-Clause, BSD-3-Clause,
            BSL-1.0, CC0-1.0, CC-BY-4.0, ISC, MIT, MIT-0, MPL-2.0,
            OpenSSL, Unicode-3.0, Unicode-DFS-2016, Unlicense, Zlib
          comment-summary-in-pr: on-failure
